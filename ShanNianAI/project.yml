name: ShanNianAI
options:
  bundleIdPrefix: com.shanian
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_KEY_CFBundleDisplayName: "一闪AI"

targets:
  ShanNianAI:
    type: application
    platform: iOS
    sources:
      - path: Sources/ShanNianAI
    settings:
      base:
        INFOPLIST_FILE: Sources/ShanNianAI/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.shanian.flashai
        CODE_SIGN_ENTITLEMENTS: Sources/ShanNianAI/ShanNianAI.entitlements
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: WidgetExtension
      - target: ShareExtension
      - target: ShanNianAITests
        type: target

  WidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/WidgetExtension
    settings:
      base:
        INFOPLIST_FILE: Sources/WidgetExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.shanian.flashai.widget
        CODE_SIGN_ENTITLEMENTS: Sources/WidgetExtension/WidgetExtension.entitlements

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ShareExtension
    settings:
      base:
        INFOPLIST_FILE: Sources/ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.shanian.flashai.share
        CODE_SIGN_ENTITLEMENTS: Sources/ShareExtension/ShareExtension.entitlements

  ShanNianAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ShanNianAITests
    settings:
      base:
        INFOPLIST_FILE: Tests/ShanNianAITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.shanian.flashai.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ShanNianAI.app/ShanNianAI"
    dependencies:
      - target: ShanNianAI
