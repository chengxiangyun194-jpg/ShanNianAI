<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一闪图标 — 第二批预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 30px; text-align: center; }
  h1 { font-size: 28px; margin-bottom: 6px; }
  .subtitle { color: #666; margin-bottom: 8px; font-size: 14px; }
  .note { color: #ff6b35; font-size: 13px; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 880px; margin: 0 auto; }
  .card { background: #161b22; border-radius: 14px; padding: 18px; }
  .card img { width: 170px; height: 170px; border-radius: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.5); margin-bottom: 10px; }
  .card h3 { font-size: 17px; margin-bottom: 2px; }
  .card .tag { display: inline-block; background: #ff6b3520; color: #ff6b35; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-top: 4px; }
  .card p { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<h1>🔥 一闪App — 图标预览（第二批）</h1>
<p class="subtitle">V5 — V8，全新风格方向</p>
<p class="note">之前还有 V1-V4，回顾请打开上一版页面</p>

<div class="grid">
  <div class="card">
    <img src="v5_duotone.png" alt="">
    <h3>V5 · 双调斩击</h3>
    <span class="tag">大胆</span>
    <p>左黑右红的对撞底色 + 45° 能量斩击线</p>
  </div>
  <div class="card">
    <img src="v6_clean.png" alt="">
    <h3>V6 · 纯白极简</h3>
    <span class="tag">现代</span>
    <p>白底 + 红色渐层星形，干净克制</p>
  </div>
  <div class="card">
    <img src="v7_cosmic.png" alt="">
    <h3>V7 · 宇宙爆发</h3>
    <span class="tag">炸裂</span>
    <p>深空星场 + 橙色超新星爆发射线</p>
  </div>
  <div class="card">
    <img src="v8_speedline.png" alt="">
    <h3>V8 · 速度线</h3>
    <span class="tag">动感</span>
    <p>彗星拖尾 + 横向动感光纹，极速闪念</p>
  </div>
</div>
</body>
</html>
